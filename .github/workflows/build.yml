name: CI

# - push / PR：自动跑检测（依赖校验 + 代码风格）
# - 手动触发(workflow_dispatch)：构建并推送镜像到 GHCR（在 Actions 页点 Run workflow）
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      push_image:
        description: "是否构建并推送镜像到 GHCR"
        type: boolean
        default: true

jobs:
  check:
    name: 检测（依赖 + 代码风格）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_mysql, bcmath, gd, intl, zip
          coverage: none

      - name: 校验 composer.json
        run: composer validate --strict

      - name: 安装依赖
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: 代码风格检查（Pint）
        run: ./vendor/bin/pint --test

  build-and-push:
    name: 构建并推送镜像
    needs: check
    # 仅手动触发且勾选 push_image 时执行
    if: github.event_name == 'workflow_dispatch' && inputs.push_image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_BASE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送 app（php-fpm）镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-app:latest
            ${{ env.IMAGE_BASE }}-app:${{ github.sha }}

      - name: 构建并推送 web（nginx）镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-web:latest
            ${{ env.IMAGE_BASE }}-web:${{ github.sha }}
