# =====================================================
# Nexora 站点 - 生产环境（nginx + php-fpm + mysql）
# 使用：
#   1. cp docker/env.prod.example .env 并填好 CHANGE_ME
#   2. docker compose -f docker-compose.prod.yml up -d --build
#   3. 首次：docker compose -f docker-compose.prod.yml exec php php artisan migrate --force
# =====================================================

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: ${REGISTRY_IMAGE_WEB:-nexora-web:latest}
    container_name: nexora-nginx
    restart: unless-stopped
    ports:
      - "0.0.0.0:${APP_PORT:-80}:80"
    depends_on:
      php:
        condition: service_started
    networks:
      - nexora-network

  php:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: ${REGISTRY_IMAGE_APP:-nexora-app:latest}
    container_name: nexora-php
    restart: unless-stopped
    volumes:
      # 运行时产生的日志/缓存/上传，持久化在卷里
      - app-storage:/var/www/html/storage
      # 环境变量只读挂载
      - ./.env:/var/www/html/.env:ro
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      # 供 entrypoint.sh 使用（compose 会从 .env 插值）
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - AUTO_MIGRATE=${AUTO_MIGRATE:-false}
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1',9000)?0:1);"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - nexora-network

  mysql:
    image: mysql:8.0
    container_name: nexora-mysql
    restart: unless-stopped
    # 仅暴露给宿主机本地，不绑 0.0.0.0
    ports:
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-nexora}
      MYSQL_USER: ${DB_USERNAME:-nexora}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --max-allowed-packet=32M
    networks:
      - nexora-network

networks:
  nexora-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  app-storage:
    driver: local
